spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:file:~/testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: 7c1[]cddbGBxquz/[+*Kf8dO"J*XmzrlK,e.E}lyeRpgULdGLQCLam?5s41Z-/m
    access-token-validity-ms: 600000
    refresh-token-validity-ms: 2592000000

  cookie:
    secure: true
    sameSite: Lax
    domain: ""
    path: /api/auth/refresh

cors:
  allowed-origins:
    - "http://localhost:4200"

logging:
  level:
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
    org.springframework: INFO

